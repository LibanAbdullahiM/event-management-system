version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:21.0

      - image: cimg/postgres:15
        environment:
          POSTGRES_USER: evms
          POSTGRES_DB: evmsDB
          POSTGRES_PASSWORD: evms@26

    working_directory: ~/repo

    steps:
      - checkout

      - restore_cache:
          keys:
            - maven-deps-{{ checksum "pom.xml" }}
            - maven-deps-

      - run:
          name: Download dependencies
          command: mvn dependency:go-offline

      - save_cache:
          paths:
            - ~/.m2
          key: maven-deps-{{ checksum "pom.xml" }}

      - run: mvn clean verify

workflows:
  build_and_test:
    jobs:
      - build